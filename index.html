<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stars • stav888</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .repo-card { transition: all 0.2s ease; }
        .repo-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <div class="max-w-6xl mx-auto px-6 py-8">
        
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-semibold">My GitHub Stars <span class="text-zinc-400 text-lg">(<span id="total-count">0</span>)</span></h1>
            
            <div class="flex gap-3">
                <button onclick="refreshStars()" 
                        class="flex items-center gap-x-2 px-4 py-2 bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 rounded-2xl text-sm">
                    <i class="fa-solid fa-sync-alt"></i>
                    <span>Refresh</span>
                </button>
            </div>
        </div>

        <!-- Search + Sort -->
        <div class="flex gap-3 mb-6">
            <div class="flex-1 relative">
                <i class="fa-solid fa-search absolute left-4 top-3 text-zinc-500"></i>
                <input type="text" id="search-input" 
                       class="w-full bg-zinc-900 border border-zinc-800 pl-11 py-3 rounded-3xl text-sm focus:outline-none focus:border-zinc-600"
                       placeholder="Search repositories...">
            </div>
            
            <select id="sort-select" onchange="renderRepos()"
                    class="bg-zinc-900 border border-zinc-800 text-sm rounded-3xl px-4 py-3 focus:outline-none">
                <option value="added" selected>Last Added (by me)</option>
                <option value="updated">Recently updated</option>
                <option value="stars">Most starred</option>
                <option value="name">Name A-Z</option>
            </select>
        </div>

        <!-- Repos Grid -->
        <div id="repos-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <!-- Populated by JS -->
        </div>

        <div id="loading" class="text-center py-12 text-zinc-400">
            <i class="fa-solid fa-spinner fa-spin mr-2"></i> Loading...
        </div>

        <div id="error" class="hidden text-center py-12 text-red-400">
            Failed to load stars.
        </div>
    </div>

    <script>
        let allRepos = [];

        async function fetchStars() {
            const username = "stav888";
            let page = 1;
            let repos = [];
            const perPage = 100;

            while (true) {
                const res = await fetch(
                    `https://api.github.com/users/${username}/starred?per_page=${perPage}&page=${page}`
                );
                
                if (!res.ok) {
                    if (res.status === 403) throw new Error("RATE_LIMIT");
                    throw new Error("API error");
                }
                
                const data = await res.json();
                if (data.length === 0) break;
                
                repos = repos.concat(data);
                if (data.length < perPage) break;
                page++;
            }

            return repos.map(repo => ({
                name: repo.name,
                description: repo.description || "",
                language: repo.language || "Unknown",
                stars: repo.stargazers_count,
                updated: repo.updated_at,
                starred_at: repo.starred_at,
                url: repo.html_url
            }));
        }

        function renderRepos() {
            const container = document.getElementById('repos-grid');
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const sortMode = document.getElementById('sort-select').value;

            let list = [...allRepos];

            if (searchTerm) {
                list = list.filter(r => 
                    r.name.toLowerCase().includes(searchTerm) || 
                    r.description.toLowerCase().includes(searchTerm)
                );
            }

            if (sortMode === 'added') {
                list.sort((a, b) => new Date(b.starred_at || b.updated) - new Date(a.starred_at || a.updated));
            } else if (sortMode === 'updated') {
                list.sort((a, b) => new Date(b.updated) - new Date(a.updated));
            } else if (sortMode === 'stars') {
                list.sort((a, b) => b.stars - a.stars);
            } else if (sortMode === 'name') {
                list.sort((a, b) => a.name.localeCompare(b.name));
            }

            container.innerHTML = '';

            if (list.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-8 text-zinc-400">No results</div>`;
                return;
            }

            list.forEach(repo => {
                const card = document.createElement('div');
                card.className = `repo-card bg-zinc-900 border border-zinc-800 rounded-3xl p-5 cursor-pointer`;
                
                card.innerHTML = `
                    <div class="flex justify-between mb-2">
                        <div class="font-semibold">${repo.name}</div>
                        <div class="text-yellow-400 text-sm flex items-center gap-x-1">
                            <i class="fa-solid fa-star"></i> ${repo.stars.toLocaleString()}
                        </div>
                    </div>
                    <div class="text-sm text-zinc-400 line-clamp-2 mb-3">${repo.description}</div>
                    <div class="flex justify-between text-xs text-zinc-500">
                        <span>${repo.language}</span>
                        <a href="${repo.url}" target="_blank" onclick="event.stopImmediatePropagation()" class="text-indigo-400">Open →</a>
                    </div>
                `;

                card.onclick = () => window.open(repo.url, '_blank');
                container.appendChild(card);
            });
        }

        async function loadStars() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error'); 
            const grid = document.getElementById('repos-grid');

            loading.classList.remove('hidden');
            error.classList.add('hidden');
            grid.innerHTML = '';

            try {
                allRepos = await fetchStars();
                loading.classList.add('hidden');
                document.getElementById('total-count').textContent = allRepos.length;
                renderRepos();

                document.getElementById('search-input').addEventListener('input', renderRepos);
                document.getElementById('sort-select').addEventListener('change', renderRepos);

            } catch (err) {
                loading.classList.add('hidden');
                error.classList.remove('hidden');
            }
        }

        function refreshStars() {
            location.reload();
        }

        window.onload = loadStars;
    </script>
</body>
</html>
