<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stars • stav888</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .repo-card { transition: all 0.2s ease; }
        .repo-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <div class="max-w-5xl mx-auto px-6 py-8">
        
        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-3xl font-semibold tracking-tight">My GitHub Stars</h1>
                <p class="text-zinc-400 text-sm mt-1">stav888 • <span id="total-count">0</span> repositories</p>
            </div>
            
            <button onclick="refreshStars()" 
                    class="flex items-center gap-x-2 px-4 py-2 bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 rounded-2xl text-sm transition-colors">
                <i class="fa-solid fa-sync-alt"></i>
                <span>Refresh</span>
            </button>
        </div>

        <!-- Search + Sort -->
        <div class="flex gap-3 mb-6">
            <div class="flex-1 relative">
                <i class="fa-solid fa-search absolute left-4 top-3 text-zinc-500"></i>
                <input type="text" id="search-input" 
                       class="w-full bg-zinc-900 border border-zinc-800 pl-11 py-3 rounded-3xl text-sm focus:outline-none focus:border-zinc-600"
                       placeholder="Search by name or description...">
            </div>
            
            <select id="sort-select" onchange="renderRepos()"
                    class="bg-zinc-900 border border-zinc-800 text-sm rounded-3xl px-4 py-3 focus:outline-none">
                <option value="added" selected>Last Added</option>
                <option value="updated">Recently updated</option>
                <option value="stars">Most starred</option>
                <option value="name">Name A-Z</option>
            </select>
        </div>

        <!-- Repos Grid -->
        <div id="repos-grid" 
             class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- Populated by JavaScript -->
        </div>

        <div id="loading" class="text-center py-12 text-zinc-400">
            <i class="fa-solid fa-spinner fa-spin mr-2"></i> Loading your stars...
        </div>

        <div id="error" class="hidden text-center py-12">
            <p id="error-message" class="text-red-400">Failed to load stars. Please try refreshing.</p>
            <button onclick="location.reload()" 
                    class="mt-4 px-5 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm">
                Try again
            </button>
        </div>
    </div>

    <script>
        let allRepos = [];

        // Fetch stars from GitHub
        async function fetchStars() {
            const username = "stav888";
            let page = 1;
            let repos = [];
            const perPage = 100;

            try {
                while (true) {
                    const res = await fetch(
                        `https://api.github.com/users/${username}/starred?per_page=${perPage}&page=${page}`
                    );
                    
                    if (!res.ok) {
                        if (res.status === 403) {
                            throw new Error("RATE_LIMIT");
                        }
                        throw new Error("GitHub API error");
                    }
                    
                    const data = await res.json();
                    if (data.length === 0) break;
                    
                    repos = repos.concat(data);
                    if (data.length < perPage) break;
                    page++;
                }

                // Clean data
                allRepos = repos.map(repo => ({
                    name: repo.name,
                    full_name: repo.full_name,
                    description: repo.description || "No description",
                    language: repo.language || "Unknown",
                    stars: repo.stargazers_count,
                    updated: repo.updated_at,
                    starred_at: repo.starred_at,
                    url: repo.html_url
                }));

                return allRepos;
            } catch (err) {
                console.error(err);
                throw err;
            }
        }

        // Render repositories
        function renderRepos(filteredRepos = null) {
            const container = document.getElementById('repos-grid');
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const sortMode = document.getElementById('sort-select').value;

            let reposToShow = filteredRepos || [...allRepos];

            // Search filter
            if (searchTerm) {
                reposToShow = reposToShow.filter(r => 
                    r.name.toLowerCase().includes(searchTerm) || 
                    r.description.toLowerCase().includes(searchTerm)
                );
            }

            // Sort
            if (sortMode === 'added') {
                reposToShow.sort((a, b) => new Date(b.starred_at || b.updated) - new Date(a.starred_at || a.updated));
            } else if (sortMode === 'updated') {
                reposToShow.sort((a, b) => new Date(b.updated) - new Date(a.updated));
            } else if (sortMode === 'stars') {
                reposToShow.sort((a, b) => b.stars - a.stars);
            } else if (sortMode === 'name') {
                reposToShow.sort((a, b) => a.name.localeCompare(b.name));
            }

            container.innerHTML = '';

            if (reposToShow.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full text-center py-10 text-zinc-400">
                        No repositories found.
                    </div>
                `;
                return;
            }

            reposToShow.forEach(repo => {
                const card = document.createElement('div');
                card.className = `repo-card bg-zinc-900 border border-zinc-800 rounded-3xl p-5 cursor-pointer`;
                
                const date = new Date(repo.updated).toLocaleDateString('en-US', { 
                    month: 'short', day: 'numeric' 
                });

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <div class="font-semibold text-lg pr-4">${repo.name}</div>
                        <div class="flex items-center gap-x-1 text-yellow-400 text-sm flex-shrink-0">
                            <i class="fa-solid fa-star"></i>
                            <span>${repo.stars.toLocaleString()}</span>
                        </div>
                    </div>
                    
                    <div class="text-sm text-zinc-400 line-clamp-2 mb-4">
                        ${repo.description}
                    </div>
                    
                    <div class="flex items-center justify-between text-xs">
                        <div class="flex items-center gap-x-2">
                            ${repo.language !== 'Unknown' ? 
                                `<span class="px-2.5 py-0.5 bg-zinc-800 rounded-full">${repo.language}</span>` : ''}
                            <span class="text-zinc-500">${date}</span>
                        </div>
                        
                        <a href="${repo.url}" target="_blank" 
                           onclick="event.stopImmediatePropagation()"
                           class="text-indigo-400 hover:text-indigo-300 flex items-center gap-x-1 text-xs">
                            Open <i class="fa-solid fa-external-link-alt text-[10px]"></i>
                        </a>
                    </div>
                `;

                // Click card to open GitHub
                card.onclick = () => window.open(repo.url, '_blank');
                container.appendChild(card);
            });
        }

        // Update total count
        function updateCount(count) {
            document.getElementById('total-count').textContent = count;
        }

        // Main function
        async function loadStars() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const grid = document.getElementById('repos-grid');

            loading.classList.remove('hidden');
            error.classList.add('hidden');
            grid.innerHTML = '';

            try {
                await fetchStars();
                
                loading.classList.add('hidden');
                updateCount(allRepos.length);
                renderRepos();

                // Search listener
                const searchInput = document.getElementById('search-input');
                searchInput.addEventListener('input', () => renderRepos());

                // Sort listener
                document.getElementById('sort-select').addEventListener('change', () => renderRepos());

            } catch (err) {
                loading.classList.add('hidden');
                error.classList.remove('hidden');

                const errorMsg = document.getElementById('error-message');
                if (err.message === "RATE_LIMIT") {
                    errorMsg.innerHTML = `GitHub rate limit reached.<br>
                    Please wait about an hour or open this page while logged into GitHub.`;
                } else {
                    errorMsg.textContent = "Failed to load stars. Please try refreshing.";
                }
            }
        }

        function refreshStars() {
            location.reload();
        }

        // Start
        window.onload = loadStars;
    </script>
</body>
</html>
